<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Finter — Fintech meets Tinder</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="phone">
    <!-- Header -->
    <header id="topbar">
      <div class="brand">Fin<span>ter</span></div>
      <div id="llm-badge" class="badge" title="Active interview backend">…</div>
    </header>

    <!-- SCREEN: Welcome -->
    <section class="screen active" id="screen-welcome">
      <div class="hero">
        <div class="logo-big">🔥</div>
        <h1>Finter</h1>
        <p class="tag">Swipe your way to investments that match <em>who you are</em>.</p>
        <ul class="steps">
          <li>① Answer a few quick questions</li>
          <li>② Have a short chat with our AI</li>
          <li>③ Swipe through tailored picks</li>
        </ul>
        <button class="primary" id="start-btn">Get started</button>
      </div>
    </section>

    <!-- SCREEN: Questionnaire -->
    <section class="screen" id="screen-quiz">
      <div class="progress"><div class="bar" id="quiz-progress"></div></div>
      <div id="quiz-body"></div>
    </section>

    <!-- SCREEN: Interview -->
    <section class="screen" id="screen-interview">
      <div id="chat"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type your answer…" autocomplete="off" />
        <button id="chat-send" class="primary small">Send</button>
      </div>
    </section>

    <!-- SCREEN: Profile reveal -->
    <section class="screen" id="screen-profile">
      <h2>Your trader DNA</h2>
      <div id="persona-cards"></div>
      <canvas id="radar" width="280" height="280"></canvas>
      <button class="primary" id="to-deck-btn">Start swiping →</button>
    </section>

    <!-- SCREEN: Swipe deck -->
    <section class="screen" id="screen-deck">
      <nav id="tabs"></nav>
      <div id="match-strip"></div>
      <div id="deck"></div>
      <div id="swipe-controls">
        <button class="circle pass" id="btn-pass" title="Pass">✕</button>
        <button class="circle info" id="btn-info" title="Details">ℹ</button>
        <button class="circle like" id="btn-like" title="Interested">♥</button>
      </div>
    </section>

    <!-- SCREEN: Likes summary -->
    <section class="screen" id="screen-likes">
      <h2>Your watchlist</h2>
      <div id="likes-list"></div>
      <button class="primary" id="back-to-deck">Keep swiping</button>
    </section>

    <!-- Bottom nav -->
    <nav id="bottomnav" class="hidden">
      <button data-screen="screen-deck" class="active">Discover</button>
      <button data-screen="screen-profile">Profile</button>
      <button data-screen="screen-likes">Watchlist <span id="like-count">0</span></button>
    </nav>
  </div>

  <!-- Instrument detail modal -->
  <div id="modal" class="hidden">
    <div class="modal-card">
      <button id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
